<!DOCTYPE html>
<html>

<head>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">

    <title>MHLProfile</title>
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>
    <h2 id="hello"></h2><br>

    <!--כפטור להכנסת ילד או בן משפחה-->
    <div id="addButton">
        <button id="createRelative">Add Relative</button>
        <button id="createMedication">Add Medication</button>
    </div><br>
    
    <!--טבלה להכנסת ילד או בן משפחה חדש-->
    <table id="relativeTable" border="1" style="display:none;">
        <tr>
            <th>Relative Name</th>
            <th>Save</th>
        </tr>
        <tbody id="relativeTableBody"></tbody>
    </table>

    <!--טבלה להכנסת תרופה חדשה-->
    <table id="medicationTable" border="1" style="display:none;">
        <tr>
            <th>Name</th>
            <th>Antibiotic</th>
            <th>Save</th>
        </tr>
        <tbody id="medicationTableBody"></tbody>
    </table>

    <p>Add new event</p>
    <!--בחירת בן משפחה -->
    <div class="form-row">
        <select id="childSelect1">
            <option value="" disabled selected hidden>Select Relative</option>
        </select>

        <!--בחירת תרופה-->
        <select id="medicationSelect">
            <option value="" disabled selected hidden>Select Medication</option>
        </select>
        <input type="text" id="dosage" placeholder="Dosage (e.g. 8ml)">
        All day in time -<input type="time" id="timeToSend" placeholder="Time to send messege">
        <button id="addMedication">Add</button>
    </div><br>

    <!--הוספת שמרטף/בייביסיטר/מטפל וכו-->
    <p>Add a new guardian</p>
    <div class="form-row">
        <input type="text" id="guardianName" placeholder="Guardian name">
        <input type="text" id="guardianRelationship" placeholder="Relationship (e.g. Babysitter)">
        <input type="email" id="guardianEmail" placeholder="Guardian email">
        <button id="addGuardian">Add Guardian</button>
    </div><br>

    <p>Add guardian for children</p>
    <div class="form-row">
        <select id="childSelect2">
            <option value="" disabled selected hidden>Select Relative</option>
        </select>
        <select id="guardianChildSelect">
            <option value="" disabled selected hidden>Select Guardian</option>
        </select>
        <button id="saveGurdianForRelative">Save</button>
    </div><br><br>

    <!--טבלת המציגה את הנתונים של בן המשפחה והתרופה-->
    <div id="tableBox">
    <table border="1">
        <tr>
            <th>Relative</th>
            <th>Medication</th>
            <th>Dosage</th>
            <th>Time to get</th>
            <th>Gurdian</th>
        </tr>
        <tbody id="logsTableBody"></tbody>
    </table>
    </div>
    <script src="JS/profile.js"></script>
</body>

</html>
